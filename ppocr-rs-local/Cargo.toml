[dependencies.clipper-sys]
version = "0.8"

[dependencies.geo-clipper]
version = "0.9"

[dependencies.geo-types]
version = "0.7"

[dependencies.image]
version = "0.25"

[dependencies.imageproc]
version = "0.25"

[dependencies.ndarray]
version = "0.16"

[dependencies.ort]
version = "=2.0.0-rc.9"
features = [
    "ndarray",
]
