[dependencies.ort-sys]
version = "=2.0.0-rc.9"

[dependencies.serde]
version = "1"
features = ["derive"]

[dependencies.serde_json]
version = "1"

[dependencies.thiserror]
version = "2"

[dependencies.ureq]
version = "2"
